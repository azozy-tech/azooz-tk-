<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azouz-TK | المنصة الرقمية العالمية</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-blue: #0071e3; --accent: #00d1ff; --bg-gray: #f5f5f7; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-gray); color: #1d1d1f; overflow-x: hidden; }
        
        /* الخلفية التقنية الذكية */
        .tech-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: radial-gradient(var(--accent) 0.6px, transparent 0.6px);
            background-size: 30px 30px; opacity: 0.12;
            animation: moveGrid 40s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 200px 200px; } }

        /* التصميم الزجاجي */
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid white; border-radius: 32px; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        .glass-card:hover { transform: scale(1.03) translateY(-10px); box-shadow: 0 40px 80px rgba(0,113,227,0.1); border-color: var(--accent); }
        
        /* نظام الأقسام */
        .cat-pill { padding: 10px 25px; border-radius: 980px; font-weight: bold; font-size: 14px; border: 1px solid #d2d2d7; transition: 0.3s; cursor: pointer; white-space: nowrap; }
        .cat-pill.active { background: var(--main-blue); color: white; border-color: var(--main-blue); box-shadow: 0 10px 20px rgba(0,113,227,0.2); }

        .view-page { display: none; }
        .active-view { display: block !important; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; z-index: 1000; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="tech-overlay"></div>
    <a href="https://wa.me/966500000000" id="wa-link" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>

    <!-- [ لوحة التحكم المركزية - أضف أقسامك ومنتجاتك هنا ] -->
    <script>
        const AZOUZ_DATABASE = {
            config: {
                whatsapp: "966500000000",
                admin_pass: "123456",
                store_url: "https://salla.sa/azouz-tk"
            },
            // أضف أي قسم تريده هنا
            categories: ["الكل", "ألعاب", "بطاقات رقمية", "اشتراكات", "خدمات تقنية", "برامج"],
            
            // أضف منتجاتك هنا (اربط كل منتج بقسمه)
            products: [
                { id: 1, cat: "ألعاب", name: "شدات ببجي - 600", price: "45", oldPrice: "60", img: "https://via.placeholder.com/500", salla: "123", desc: "شحن فوري عبر الأيدي." },
                { id: 2, cat: "اشتراكات", name: "يوتيوب بريميوم - سنة", price: "120", oldPrice: "200", img: "https://via.placeholder.com/500", salla: "456", desc: "اشتراك رسمي بضمان كامل." },
                { id: 3, cat: "بطاقات رقمية", name: "بطاقة آيتونز 100$", price: "375", oldPrice: "400", img: "https://via.placeholder.com/500", salla: "789", desc: "كود فوري يوصلك برسالة." },
                { id: 4, cat: "خدمات تقنية", name: "تصميم متجر احترافي", price: "999", oldPrice: "1500", img: "https://via.placeholder.com/500", salla: "000", desc: "تصميم عصري مثل متجر آبل." },
                // أضف مئات المنتجات هنا بنفس التنسيق...
            ]
        };
    </script>

    <!-- Navbar -->
    <nav class="glass-header fixed w-full z-50 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
            <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg">AZ</div>
            <span class="text-2xl font-black tracking-tighter uppercase">AZOUZ<span class="text-[#0071e3]">-TK</span></span>
        </div>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-4 items-center bg-gray-100 px-4 py-2 rounded-full border border-gray-200">
                <i class="fas fa-search text-gray-400"></i>
                <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="ابحث عن منتج..." class="bg-transparent border-none outline-none text-xs w-40 font-bold">
            </div>
            <button onclick="openAdmin()" class="text-gray-300 hover:text-blue-600 transition"><i class="fas fa-lock"></i></button>
        </div>
    </nav>

    <!-- [ واجهة المتجر الرئيسية ] -->
    <main id="home-view" class="page-view active-view pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-6xl md:text-9xl font-black leading-none mb-6 tracking-tighter italic">THE <span class="text-[#0071e3]">PLATFORM.</span></h1>
            <p class="text-gray-400 text-xl md:text-2xl font-light">استكشف أكبر تشكيلة من المنتجات الرقمية في مكان واحد.</p>
        </header>

        <!-- شريط الأقسام الذكي -->
        <div class="flex overflow-x-auto gap-4 mb-16 pb-4 no-scrollbar justify-start md:justify-center" id="category-bar">
            <!-- سيتم توليد الأقسام هنا -->
        </div>

        <div id="store-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <!-- المنتجات تتولد هنا -->
        </div>
    </main>

    <!-- [ واجهة تفاصيل المنتج ] -->
    <section id="detail-view" class="page-view pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <button onclick="showView('home')" class="text-blue-600 font-bold mb-12 text-lg">← العودة للمتجر</button>
        <div id="detail-content" class="grid grid-cols-1 md:grid-cols-2 gap-20 items-start">
            <!-- محتوى تفصيلي -->
        </div>
    </section>

    <!-- [ لوحة الإدارة ] -->
    <section id="admin-view" class="page-view pt-32 pb-20 px-6 max-w-5xl mx-auto">
        <div class="glass-card p-12 text-right">
            <h2 class="text-4xl font-black mb-8">إدارة المنصة 🛡️</h2>
            <p class="text-gray-500 mb-10">لإضافة منتجات، عدل مصفوفة البيانات في كود GitHub (AZOUZ_DATABASE).</p>
            <div id="admin-list" class="space-y-4 font-bold text-sm">
                <!-- قائمة المنتجات مجمعة حسب القسم -->
            </div>
        </div>
    </section>

    <footer class="py-20 text-center text-gray-400 text-[10px] font-black tracking-widest uppercase border-t border-gray-100 mt-40">
        © 2024 AZOUZ-TK DIGITAL ECOSYSTEM | DEVELOPED BY SMART AI
    </footer>

    <script>
        function showView(view) {
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(view + '-view').classList.add('active-view');
            window.scrollTo(0, 0);
        }

        function openAdmin() {
            if(prompt("كلمة مرور الإدارة:") === AZOUZ_DATABASE.config.admin_pass) showView('admin');
        }

        function renderCategories() {
            const bar = document.getElementById('category-bar');
            AZOUZ_DATABASE.categories.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = `cat-pill ${cat === 'الكل' ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderStore(cat);
                };
                bar.appendChild(btn);
            });
        }

        function renderStore(filter = 'الكل', searchTerm = '') {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = '';
            
            let filtered = AZOUZ_DATABASE.products;
            if(filter !== 'الكل') filtered = filtered.filter(p => p.cat === filter);
            if(searchTerm) filtered = filtered.filter(p => p.name.includes(searchTerm));

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="glass-card p-8 cursor-pointer group" onclick="openProduct(${p.id})">
                        <div class="aspect-square rounded-[24px] bg-gray-50 mb-8 overflow-hidden flex items-center justify-center border border-gray-100">
                            <img src="${p.img}" class="max-h-[80%] transition duration-700 group-hover:scale-110">
                        </div>
                        <span class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-2 block">${p.cat}</span>
                        <h3 class="text-2xl font-black mb-4 leading-tight">${p.name}</h3>
                        <div class="flex justify-between items-center pt-6 border-t border-gray-50 mt-4">
                            <span class="text-2xl font-black text-black">${p.price} ر.س</span>
                            <span class="text-gray-400 font-bold text-xs">عرض ></span>
                        </div>
                    </div>
                `;
            });
        }

        function searchProducts() {
            const term = document.getElementById('search-input').value;
            renderStore('الكل', term);
        }

        function openProduct(id) {
            const p = AZOUZ_DATABASE.products.find(x => x.id === id);
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="glass-card p-6 shadow-2xl"><img src="${p.img}" class="w-full rounded-[24px]"></div>
                <div>
                    <span class="text-blue-600 font-black uppercase text-xs tracking-widest mb-4 block">${p.cat}</span>
                    <h2 class="text-6xl font-black mb-10 leading-tight">${p.name}</h2>
                    <div class="flex items-center gap-8 mb-12">
                        <span class="text-5xl font-black text-black">${p.price} ر.س</span>
                        <span class="text-2xl text-gray-300 line-through">${p.oldPrice} ر.س</span>
                    </div>
                    <div class="bg-white p-10 rounded-[40px] border border-gray-50 leading-relaxed text-gray-500 mb-12 shadow-sm">${p.desc}</div>
                    <a href="${AZOUZ_DATABASE.config.store_url}/cart/add/${p.salla_id}" class="bg-[#0071e3] text-white block text-center py-6 text-2xl font-black rounded-full shadow-2xl hover:opacity-80 transition">إتمام الطلب في سلة</a>
                </div>
            `;
            showView('detail');
        }

        window.onload = () => {
            document.getElementById('wa-link').href = `https://wa.me/${AZOUZ_DATABASE.config.whatsapp}`;
            renderCategories();
            renderStore();
        };
    </script>
</body>
</html>
